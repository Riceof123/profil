<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTING VINDO NET</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #333;
    }
    h1 {
      margin-bottom: 32px;
    }
    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .button-link {
      display: inline-block;
      padding: 18px 28px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }
    .button-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.18);
    }
    .red { background: #d32f2f; }
    .yellow { background: #fbc02d; color: #222; }
    .black { background: #000; }
    .blue { background: #1976d2; }
    .green { background: #388e3c; }
    .button-column { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .button-column.center { justify-content: center; }
  </style>
</head>
<body>
  <h1>TESTING VINDO NET</h1>
  <div class="buttons">
    <div class="button-column">
      <a class="button-link red" href="https://www.google.com/search?q=Ubuntu&oq=Ubuntu+&sourceid=chrome&ie=UTF-8" target="_blank" rel="noopener noreferrer">Tombol Merah</a>
      <a class="button-link yellow" href="https://cachyos.org/" target="_blank" rel="noopener noreferrer">Tombol Kuning</a>
    </div>
    <div class="button-column center">
      <a class="button-link black" href="game.html">Tombol Hitam</a>
    </div>
    <div class="button-column">
      <a class="button-link blue" href="https://bazzite.gg/" target="_blank" rel="noopener noreferrer">Tombol Biru</a>
      <a class="button-link green" href="https://www.fedoraproject.org/" target="_blank" rel="noopener noreferrer">Tombol Hijau</a>
    </div>
  </div>
</body>
</html>
