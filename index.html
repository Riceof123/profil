<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TESTING VINDO NET</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('Denia1.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
      color: #fff;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
    }
    h1 {
      margin-bottom: 32px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 360px;
      align-items: stretch;
    }
    .button-link {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 16px 24px;
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
    }
    .button-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(0,0,0,0.18);
    }
    .red { background: #d32f2f; }
    .yellow { background: #fbc02d; color: #222; }
    .black { background: #212121; }
    .blue { background: #1976d2; }
    .green { background: #388e3c; }
    .purple { background: #6a1b9a; }
    .orange { background: #ff9800; color: #111; }
    .darkred { background: #7d1f1f; }
  </style>
</head>
<body>
  <h1>TESTING VINDO NET</h1>

      <a class="button-link yellow" href="https://cachyos.org/" target="_blank" rel="noopener noreferrer">Tombol Kuning</a>
      <a class="button-link black" href="game.html">Tombol Hitam</a>
      <a class="button-link blue" href="https://bazzite.gg/" target="_blank" rel="noopener noreferrer">Tombol Biru</a>
      <a class="button-link green" href="https://www.fedoraproject.org/" target="_blank" rel="noopener noreferrer">Tombol Hijau</a>
      <a class="button-link purple" href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">Tombol Ungu</a>
      <a class="button-link orange" href="chat.html">AI Chat Bot</a>
      <a class="button-link darkred" href="warning.html">Warning</a>
  </div>
</body>
</html>
