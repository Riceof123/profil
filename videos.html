<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player - TESTING VINDO NET</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 24px;
    }
    .container {
      width: 100%;
      max-width: 1200px;
    }
    h1 {
      text-align: center;
      margin-bottom: 48px;
      font-size: 2.4rem;
      color: #fff;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 32px;
      margin-bottom: 40px;
    }
    .video-card {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .video-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 28px 56px rgba(0,0,0,0.4);
    }
    .video-thumbnail {
      width: 100%;
      height: 280px;
      background: linear-gradient(135deg, #1e293b, #334155);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
    }
    .video-content {
      padding: 28px;
    }
    .video-number {
      color: #64748b;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .video-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.6;
      color: #e2e8f0;
    }
    .play-button {
      width: 100%;
      padding: 14px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .play-button:hover {
      transform: translateY(-2px);
      background: #1d4ed8;
    }
    .video-player {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 40px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    iframe {
      width: 100%;
      height: 540px;
      border: none;
    }
    .player-controls {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn-back {
      background: rgba(148, 163, 184, 0.12);
      color: #cbd5e1;
    }
    .btn-back:hover {
      background: rgba(148, 163, 184, 0.18);
      transform: translateY(-2px);
    }
    .btn-menu {
      background: #2563eb;
      color: white;
    }
    .btn-menu:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Video Player</h1>
    
    <div id="gridView" class="video-grid">
      <div class="video-card" onclick="playVideo(1)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-content">
          <div class="video-number">Video Pertama</div>
          <div class="video-title">Wuthering Waves - Resonator Showcase - Denia — Human Mimicry Protocol</div>
          <button class="play-button">Putar Video</button>
        </div>
      </div>

      <div class="video-card" onclick="playVideo(2)">
        <div class="video-thumbnail">▶️</div>
        <div class="video-content">
          <div class="video-number">Video Kedua</div>
          <div class="video-title">Wuthering Waves Story Cinematics - Lustrous Yesterdays</div>
          <button class="play-button">Putar Video</button>
        </div>
      </div>
    </div>

    <div id="playerView" class="hidden">
      <div class="video-player">
        <video id="videoPlayer" width="100%" height="540" controls style="background: #000;">
          <source id="videoSource" src="" type="video/mp4">
          Browser Anda tidak mendukung video HTML5. Silakan gunakan browser terbaru.
        </video>
      </div>
      <div class="player-controls">
        <button class="btn btn-back" onclick="backToGrid()">Kembali ke Pilihan</button>
        <a href="index.html" class="btn btn-menu">Kembali ke Menu</a>
      </div>
    </div>
  </div>

  <script>
    const videos = {
      1: {
        title: "Wuthering Waves - Resonator Showcase - Denia — Human Mimicry Protocol",
        file: "Wuthering Waves _ Resonator Showcase _ Denia — Human Mimicry Protocol.mp4"
      },
      2: {
        title: "Wuthering Waves Story Cinematics - Lustrous Yesterdays",
        file: "Wuthering Waves Story Cinematics  Lustrous Yesterdays.mp4"
      }
    };

    function playVideo(videoNum) {
      const gridView = document.getElementById('gridView');
      const playerView = document.getElementById('playerView');
      const videoSource = document.getElementById('videoSource');
      const videoPlayer = document.getElementById('videoPlayer');
      
      gridView.classList.add('hidden');
      playerView.classList.remove('hidden');
      
      const videoFile = videos[videoNum].file;
      videoSource.src = videoFile;
      videoPlayer.load();
      
      // Handle loading errors
      videoPlayer.onerror = function() {
        alert('Gagal memuat video. Pastikan file video ada di folder yang benar.');
      };
      
      videoPlayer.play().catch(function(err) {
        console.error('Error playing video:', err);
        alert('Error memutar video: ' + err.message);
      });
    }

    function backToGrid() {
      const gridView = document.getElementById('gridView');
      const playerView = document.getElementById('playerView');
      const videoPlayer = document.getElementById('videoPlayer');
      const videoSource = document.getElementById('videoSource');
      
      gridView.classList.remove('hidden');
      playerView.classList.add('hidden');
      videoPlayer.pause();
      videoSource.src = '';
    }
  </script>
</body>
</html>
