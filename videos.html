<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warning - Rusak</title>
  <style>
    body { margin:0; font-family: Inter, Arial, sans-serif; background: #0b1220; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background: linear-gradient(180deg,#131827,#0b1220); padding:40px; border-radius:18px; box-shadow:0 20px 50px rgba(0,0,0,0.6); text-align:center; max-width:720px; width:90%; }
    h1 { margin:0 0 12px; color:#ffb4b4; }
    p { color:#d9bfbf; }
    .broken-btn { background:#7d1f1f; color:#fff; border:none; padding:18px 26px; border-radius:12px; font-weight:800; font-size:1.05rem; cursor:pointer; }
    .actions { margin-top:22px; display:flex; gap:14px; justify-content:center; }
    .link-btn { background:#333; color:#fff; padding:10px 16px; border-radius:10px; text-decoration:none; }
    .countdown { margin-top:18px; color:#ffdcdc; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Video Player</h1>
    <p>Fitur pemutaran video sedang tidak tersedia di halaman ini.</p>
    <div style="margin-top:22px;">
      <button id="brokenBtn" class="broken-btn">Tombol ini Rusak</button>
    </div>
    <div id="messageArea" style="margin-top:24px;"></div>
  </div>

  <script>
    const brokenBtn = document.getElementById('brokenBtn');
    const messageArea = document.getElementById('messageArea');
    let redirectTimer = null;
    let countdownInterval = null;

    function startRedirectCountdown() {
      let remaining = 15;
      messageArea.innerHTML = `
        <div class="countdown">Udah Di Bilangin Rusak — Sekarang balik aja sana, jangan ke sini.</div>
        <div class="countdown" id="cd">Kamu akan dipaksa kembali ke beranda dalam ${remaining} detik.</div>
        <div class="actions">
          <a href="index.html" class="link-btn">Kembali ke Beranda</a>
          <button id="stayBtn" class="link-btn">Tetap di Halaman</button>
        </div>
      `;

      const cdEl = document.getElementById('cd');
      const stayBtn = document.getElementById('stayBtn');

      countdownInterval = setInterval(() => {
        remaining -= 1;
        if (cdEl) cdEl.textContent = `Kamu akan dipaksa kembali ke beranda dalam ${remaining} detik.`;
      }, 1000);

      redirectTimer = setTimeout(() => {
        window.location.href = 'index.html';
      }, remaining * 1000);

      stayBtn.addEventListener('click', () => {
        clearTimeout(redirectTimer);
        clearInterval(countdownInterval);
        messageArea.innerHTML = `<div class="countdown">Baik, kamu tetap di sini. Tapi tombol memang rusak.</div><div style=\"margin-top:16px;\"><a href=\"index.html\" class=\"link-btn\">Kembali ke Beranda</a></div>`;
      });
    }

    brokenBtn.addEventListener('click', () => {
      // replace area with broken message and start countdown
      startRedirectCountdown();
      // disable button to prevent multiple clicks
      brokenBtn.disabled = true;
      brokenBtn.style.opacity = '0.7';
    });
  </script>
</body>
</html>
