<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warning - TESTING VINDO NET</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a0000, #330000);
      color: #fff;
    }
    .container {
      background: rgba(0,0,0,0.7);
      padding: 60px 48px;
      border-radius: 24px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(211,45,45,0.4);
      border: 2px solid #d32f2f;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 3.2rem;
      color: #ff6b6b;
      text-shadow: 0 0 10px rgba(211,45,45,0.8);
      letter-spacing: 2px;
    }
    .warning-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .message {
      font-size: 1.3rem;
      line-height: 1.8;
      color: #ffcccc;
      margin: 30px 0;
      font-weight: 500;
    }
    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a, button {
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }
    .btn-back {
      background: #333;
      color: #fff;
    }
    .btn-back:hover {
      transform: translateY(-2px);
      background: #444;
      box-shadow: 0 16px 32px rgba(0,0,0,0.4);
    }
    .btn-ready {
      background: #d32f2f;
      color: #fff;
    }
    .btn-ready:hover {
      transform: translateY(-2px);
      background: #ff5252;
      box-shadow: 0 16px 32px rgba(211,45,45,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="warning-icon">⚠️</span>
    <h1>WARNING</h1>
    <div class="message">
      Sebaiknya jangan lanjutkan kalau memang tidak siap!
    </div>
    <div class="buttons">
      <a href="index.html" class="btn-back">Kembali ke Beranda</a>
      <a href="videos.html" class="btn-ready">Saya Siap</a>
    </div>
  </div>
</body>
</html>
